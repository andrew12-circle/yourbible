        place-items: center;
        border: 1px solid rgba(109, 42, 34, 0.18);
        border-radius: 1.375rem;

        font-size: 2.25rem;
        line-height: 1;
      }

        font-size: 1rem;
        font-weight: 650;
        letter-spacing: 0.02em;
      }
      #boot-loading .boot-spinner {
        width: 1.5rem;
        height: 1.5rem;
        border: 2px solid rgba(122, 40, 40, 0.16);
        border-top-color: #c18a2f;
        border-radius: 9999px;
        animation: boot-spin 0.7s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #boot-loading .boot-spinner {
          animation: none;
        }
      }
