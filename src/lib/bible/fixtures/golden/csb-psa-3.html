<p class="s1">A Prayer for Protection</p><p class="d">A psalm of David. When he fled from his son Absalom.</p><p class="q1"><span data-number="1" data-sid="PSA 3:1" class="v">1</span>Lord, how my foes multiply! <span class="qs">Selah</span></p><p class="q1"><span data-number="2" data-sid="PSA 3:2" class="v">2</span>Many rise up against me! <span class="qs">Selah</span></p><p class="q1"><span data-number="3" data-sid="PSA 3:3" class="v">3</span>But you, Lord, are a shield around me.</p>
